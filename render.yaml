# ===========================================
# Render Blueprint — IPS Freight Platform
# ===========================================
# Deploy the full stack on Render's free tier with one click.
# See DEPLOY.md for step-by-step instructions.

services:
  # -------------------------------------------
  # Express API
  # -------------------------------------------
  - type: web
    name: ips-freight-api
    runtime: node
    region: oregon
    plan: free
    nodeVersion: 20
    rootDir: apps/api
    # apps/api has its own package.json and works standalone (no root workspace needed in production).
    buildCommand: npm install && npx prisma generate && npm run build
    # `prisma migrate deploy` applies any committed migrations idempotently (safe on every restart).
    # Render free tier runs a single instance so there is no multi-instance race condition.
    startCommand: npx prisma migrate deploy && node dist/app.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 10000
      # Render injects DATABASE_URL automatically from the linked database below.
      - key: DATABASE_URL
        fromDatabase:
          name: ips-freight-db
          property: connectionString
      # ⚠️  Set CORS_ORIGINS to your Vercel URL after deploying the frontend.
      #     Example: https://ips-freight.vercel.app
      - key: CORS_ORIGINS
        sync: false
      # ⚠️  Change JWT_SECRET to a random value — generate one at:
      #     https://generate-secret.vercel.app/64
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: LOG_LEVEL
        value: info
      # Redis is optional — the app runs without it.
      # If you add a Redis service later, set REDIS_URL here.

databases:
  # -------------------------------------------
  # PostgreSQL Database
  # -------------------------------------------
  - name: ips-freight-db
    databaseName: ips_freight
    user: ips_user
    plan: free
    region: oregon

# ===========================================
# Render Blueprint — IPS Freight Platform
# ===========================================
# One-click deploy: API + React frontend + PostgreSQL, all on Render's free tier.
# See DEPLOY.md for a step-by-step walkthrough.

services:
  # -------------------------------------------
  # Express API (also serves the React frontend)
  # -------------------------------------------
  - type: web
    name: ips-freight-api
    runtime: node
    region: oregon
    plan: free
    nodeVersion: 20
    # Build from repo root so we can build the web app first, then the API.
    # The compiled React static files (apps/web/dist) are served by Express directly,
    # so no separate static site or Vercel account is needed.
    #
    # NOTE: NODE_ENV=production (set below) causes plain `npm install` to skip
    # devDependencies. We use --include=dev so build tools (tsc, vite, prisma)
    # are always available. A single root install covers both workspace packages.
    buildCommand: "npm install --include=dev && (cd apps/web && npm run build) && (cd apps/api && npx prisma generate && npm run build)"
    # migrate deploy is idempotent — safe to run on every restart.
    startCommand: cd apps/api && npx prisma migrate deploy && node dist/app.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically; API_PORT is the fallback for local Docker.
      # API_PORT is intentionally NOT set here so Render's PORT takes effect.
      # - key: API_PORT
      #   value: 10000
      # Render automatically injects DATABASE_URL from the linked database below.
      - key: DATABASE_URL
        fromDatabase:
          name: ips-freight-db
          property: connectionString
      # JWT_SECRET is auto-generated by Render — no action needed.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: LOG_LEVEL
        value: info
      # CORS_ORIGINS is no longer required — the React frontend is served from the
      # same origin as the API (no cross-origin requests). Set it only if you also
      # want to allow a separately-hosted frontend.
      # - key: CORS_ORIGINS
      #   value: https://your-other-frontend.vercel.app

databases:
  # -------------------------------------------
  # PostgreSQL Database
  # -------------------------------------------
  - name: ips-freight-db
    databaseName: ips_freight
    user: ips_user
    plan: free
    region: oregon
